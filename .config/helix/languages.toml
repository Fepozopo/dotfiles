[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }

[[language]]
name = "python"
language-servers = ["ty", "ruff"]
auto-format = true

[language-server.ty]
command = "ty"
args = ["server"]
[language-server.ty.config]
inlayHints.callArgumentNames = false
experimental.rename = true
experimental.autoImport = true

[language-server.ruff]
command = "ruff"
args = ["server"]
